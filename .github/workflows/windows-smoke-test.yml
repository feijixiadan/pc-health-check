name: Windows smoke test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ".\scripts\pc-health-check.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null

          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
          }

      - name: Run read-only diagnostic script
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\pc-health-check.ps1 -RedactIdentity -HtmlReport

          $desktop = [Environment]::GetFolderPath("Desktop")
          $txt = Get-ChildItem -Path $desktop -Filter "PC-Health-Report-*.txt" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $json = Get-ChildItem -Path $desktop -Filter "PC-Health-Report-*.json" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $html = Get-ChildItem -Path $desktop -Filter "PC-Health-Report-*.html" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $txt) {
            throw "TXT report was not generated."
          }
          if (-not $json) {
            throw "JSON report was not generated."
          }
          if (-not $html) {
            throw "HTML report was not generated."
          }

          $txtContent = Get-Content $txt.FullName -Raw
          $requiredSections = @(
            "PC Health Check Report",
            "==== Quick Findings ====",
            "==== System ====",
            "==== Performance ====",
            "==== Drives ====",
            "==== Startup Items ====",
            "==== Antivirus ====",
            "==== Windows Update ====",
            "==== Browser Check ====",
            "==== Temporary Folders ====",
            "==== Next Step Suggestion ===="
          )

          foreach ($section in $requiredSections) {
            if (-not $txtContent.Contains($section)) {
              throw "TXT report is missing required section: $section"
            }
          }

          $jsonContent = Get-Content $json.FullName -Raw
          $report = $jsonContent | ConvertFrom-Json
          $htmlContent = Get-Content $html.FullName -Raw
          $requiredJsonKeys = @(
            "GeneratedAt",
            "Tool",
            "Mode",
            "Privacy",
            "System",
            "Performance",
            "Drives",
            "StartupCommands",
            "WindowsUpdateServices",
            "BrowserExtensions",
            "TempFolders",
            "Findings"
          )

          foreach ($key in $requiredJsonKeys) {
            if (-not $report.PSObject.Properties.Name.Contains($key)) {
              throw "JSON report is missing required key: $key"
            }
          }

          if ($report.System.ComputerName -ne "[redacted]") {
            throw "Expected redacted computer name in JSON report."
          }
          if ($report.System.UserName -ne "[redacted]") {
            throw "Expected redacted user name in JSON report."
          }
          if ($report.Privacy.RedactIdentity -ne $true) {
            throw "Expected Privacy.RedactIdentity to be true in JSON report."
          }
          if (-not $htmlContent.Contains("<title>PC Health Check Report</title>")) {
            throw "HTML report is missing the expected title."
          }
          if (-not $htmlContent.Contains("Identity redaction")) {
            throw "HTML report is missing privacy metadata."
          }
          if (-not $htmlContent.Contains("Quick Findings")) {
            throw "HTML report is missing quick findings."
          }

          $identityNeedles = @($env:USERNAME, $env:COMPUTERNAME) |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          foreach ($needle in $identityNeedles) {
            if ($txtContent.IndexOf($needle, [System.StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "TXT report contains unredacted identity value: $needle"
            }
            if ($jsonContent.IndexOf($needle, [System.StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "JSON report contains unredacted identity value: $needle"
            }
            if ($htmlContent.IndexOf($needle, [System.StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "HTML report contains unredacted identity value: $needle"
            }
          }

          $chromeIds = @($report.BrowserExtensions.ChromeIds)
          $edgeIds = @($report.BrowserExtensions.EdgeIds)
          foreach ($extensionId in @($chromeIds + $edgeIds)) {
            if ($extensionId -and -not ([string]$extensionId).StartsWith("[redacted-extension-id-")) {
              throw "Browser extension ID was not redacted: $extensionId"
            }
          }

          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $txt.FullName artifacts/
          Copy-Item $json.FullName artifacts/
          Copy-Item $html.FullName artifacts/

          Get-Content $txt.FullName -TotalCount 30

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: pc-health-report
          path: artifacts/*
